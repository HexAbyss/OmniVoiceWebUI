server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ---- Security headers ----
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";

    # ---- Cache static assets ----
    # JS/CSS use no-cache so the browser always revalidates (safe for deployments).
    # Binary assets like fonts and images are immutably cached.
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location ~* \.(ico|svg|png|jpg|jpeg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Proxy API calls to the backend container ----
    # The JS frontend calls /api/* with API_BASE = '' (same origin).
    # Nginx forwards those requests to the backend service.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # TTS inference + large audio uploads can take time
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        client_max_body_size  50M;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
